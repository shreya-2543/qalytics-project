version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qalytics-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./backend/qalytics.db
      - SECRET_KEY=qalytics-docker-dev-key-change-in-prod
      - BOOTSTRAP_ADMIN_ENABLED=true
      - BOOTSTRAP_ADMIN_USERNAME=admin
      - BOOTSTRAP_ADMIN_PASSWORD=admin
      - BOOTSTRAP_ADMIN_EMAIL=admin@qalytics.dev
      - QA_ENV=docker
    volumes:
      - ./backend:/app/backend
      - ./reports:/app/reports
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (simple Python HTTP server)
  frontend:
    image: python:3.12-slim
    container_name: qalytics-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/frontend:ro
    working_dir: /frontend
    command: python -m http.server 3000
    depends_on:
      - backend

volumes:
  qalytics_data:

networks:
  default:
    name: qalytics-network
