name: QAlytics CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Test Backend
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check backend/ --select=E9,F63,F7,F82 --show-source
        continue-on-error: true

      - name: Format check with Black
        run: |
          pip install black
          black --check backend/ automation/ --diff
        continue-on-error: true

      - name: Type check with MyPy
        run: |
          pip install mypy
          mypy backend/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: |
          pytest automation/ -v --tb=short --cov=backend --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Build Docker Image
  build-docker:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: qalytics:${{ github.sha }}

  # Security Scan
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
        continue-on-error: true

      - name: Check dependencies for vulnerabilities
        run: |
          pip install safety
          safety check --json
        continue-on-error: true

  # Generate Report
  generate-report:
    runs-on: ubuntu-latest
    needs: test-backend
    if: always()

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Generate Allure Report
        run: |
          pytest automation/ --allure-dir=allure-results
        continue-on-error: true

      - name: Upload Allure Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: allure-report
          path: allure-results/

  # Notify Status
  notify:
    runs-on: ubuntu-latest
    needs: [test-backend, build-docker, security]
    if: always()

    steps:
      - name: Check pipeline status
        run: |
          if [[ "${{ needs.test-backend.result }}" == "failure" ]]; then
            echo "Tests failed!"
            exit 1
          fi
          echo "Pipeline successful!"
